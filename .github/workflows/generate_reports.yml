name: Generate Test Reports

on:
  push:
    branches:
      - '**' # Run on all branches

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pandas

      - name: Generate Reports
        run: |
          mkdir -p test_reports
          python test/generate_exhaustive_e2e_excel.py
          python test/generate_selenium_report.py
          python test/generate_vulnerability_report.py

      - name: Upload Excel Reports
        uses: actions/upload-artifact@v4
        with:
          name: agrirent-test-reports
          path: test_reports/*.xlsx
          retention-days: 30
