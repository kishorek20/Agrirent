name: Generate Test Reports

on:
  push:
    branches:
      - '**' # Run on all branches

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pandas

      # ── K6 Load Testing ──────────────────────────────────────────────────
      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run K6 Load Test
        run: |
          mkdir -p test_reports
          k6 run test/k6_load_test.js \
            --summary-export=test_reports/k6_results.json \
            --out json=test_reports/k6_raw_output.json \
            2>&1 | tee test_reports/k6_console_output.txt
        continue-on-error: true  # Don't fail the workflow if thresholds breach

      - name: Generate K6 Load Test Excel Report
        run: |
          python test/generate_k6_report.py \
            test_reports/k6_results.json \
            test_reports/K6_Load_Test_Report.xlsx

      # ── Other Test Reports ───────────────────────────────────────────────
      - name: Generate Other Test Reports
        run: |
          python test/generate_exhaustive_e2e_excel.py
          python test/generate_selenium_report.py
          python test/generate_vulnerability_report.py

      # ── Upload All Reports ──────────────────────────────────────────────
      - name: Upload Excel Reports
        uses: actions/upload-artifact@v4
        with:
          name: agrirent-test-reports
          path: |
            test_reports/*.xlsx
            test_reports/k6_console_output.txt
          retention-days: 30
