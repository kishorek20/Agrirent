name: agrirent
description: AgriRent – Smart Agriculture Vehicle Rental Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  provider: ^6.1.1
  go_router: ^13.0.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.66.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.0.7
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
